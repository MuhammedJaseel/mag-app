
services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_server
    restart: always
    ports:
      - "6380:6379"

  api:
    build: ./backend
    container_name: api_service
    restart: always
    ports:
      - "5011:5010"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  worker:
    build: ./worker
    container_name: worker_service
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: